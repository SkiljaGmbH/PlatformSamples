<div class="logs-wrapper">
  <div class="logs-container">
    @for (log of logsList; track log) {
      <div class="log-entry">
        <div [innerHTML]="log | urlCustomPipe"></div>
      </div>
    }

    @if (logsList?.length === 0) {
      <div class="empty-logs">
        No logs to display.
      </div>
    }
  </div>
</div>
