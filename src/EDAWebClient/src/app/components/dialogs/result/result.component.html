<div class="results-dialog-container">
  <h2 mat-dialog-title>Select notification to process</h2>

  <mat-dialog-content class="dialog-table-content">
    <div class="table-scroll-wrapper">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="select">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox
              (click)="$event.stopPropagation()"
              (change)="$event ? selectedNotification.toggle(row) : null"
              [checked]="selectedNotification.isSelected(row)"
              color="primary"
            >
            </mat-checkbox>
          </td>
        </ng-container>

        <ng-container matColumnDef="CreationTime">
          <th mat-header-cell *matHeaderCellDef>Creation time</th>
          <td
            mat-cell
            *matCellDef="let element"
            class="ellipsis"
            title="{{ element.CreationTime }}"
          >
            {{ element.CreationTime }}
          </td>
        </ng-container>

        <ng-container matColumnDef="WorkItemID">
          <th mat-header-cell *matHeaderCellDef>Work item ID</th>
          <td
            mat-cell
            *matCellDef="let element"
            class="ellipsis"
            title="{{ element.WorkItemID }}"
          >
            {{ element.WorkItemID }}
          </td>
        </ng-container>

        <ng-container matColumnDef="ActivityInstanceID">
          <th mat-header-cell *matHeaderCellDef>Activity Instance ID</th>
          <td
            mat-cell
            *matCellDef="let element"
            class="ellipsis"
            title="{{ element.ActivityInstanceID }}"
          >
            {{ element.ActivityInstanceID }}
          </td>
        </ng-container>

        <ng-container matColumnDef="Message">
          <th mat-header-cell *matHeaderCellDef>Message</th>
          <td
            mat-cell
            *matCellDef="let element"
            class="ellipsis"
            title="{{ element.Message }}"
          >
            {{ element.Message }}
          </td>
        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns; sticky: true"
        ></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          (click)="selectedNotification.toggle(row)"
          [class.selected-row]="selectedNotification.isSelected(row)"
        ></tr>
      </table>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onProcess()">
      Output
    </button>
  </mat-dialog-actions>
</div>
